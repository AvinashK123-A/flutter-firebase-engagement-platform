name: flutter_firebase_engagement_platform
description: Firebase-powered engagement platform with Google/OTP auth, FCM push notifications, Dynamic Links, Remote Config, In-App Messaging, Crashlytics, and Analytics.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management (GetX)
  get: ^4.6.6

  # Firebase (Full Suite)
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.7.4
  firebase_crashlytics: ^3.4.8
  firebase_performance: ^0.9.3+8
  firebase_remote_config: ^4.3.8
  firebase_dynamic_links: ^5.4.8
  firebase_in_app_messaging: ^0.7.4+3
  firebase_app_check: ^0.2.1+8

  # Authentication
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^6.1.1

  # Networking
  dio: ^5.3.2
  retrofit: ^4.1.0

  # Dependency Injection
  get_it: ^7.6.4

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Deep Links
  app_links: ^4.0.0

  # UI
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_local_notifications: ^16.3.2

  # Utils
  uuid: ^4.1.0
  intl: ^0.18.1
  connectivity_plus: ^5.0.2
  rxdart: ^0.27.7
  logger: ^2.0.2+1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  permission_handler: ^11.0.1
  image_picker: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  retrofit_generator: ^8.1.0
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
