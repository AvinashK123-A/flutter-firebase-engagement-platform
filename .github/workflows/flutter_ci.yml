# Flutter CI/CD — flutter-firebase-engagement-platform
name: Flutter CI/CD

on:
  push:
    branches: [ main, develop, 'release/**' ]
  pull_request:
    branches: [ main, develop ]

env:
  FLUTTER_VERSION: '3.19.0'
  JAVA_VERSION: '17'

jobs:
  analyze:
    name: Analyze and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze --no-pub --fatal-infos

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter test --coverage
      - uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info

  build-android:
    name: Android (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        flavor: [ dev, qa, prod ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json
      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --flavor ${{ matrix.flavor }} --target lib/main.dart --release
      - uses: actions/upload-artifact@v3
        with:
          name: android-${{ matrix.flavor }}
          path: build/app/outputs/flutter-apk/

  build-ios:
    name: iOS (${{ matrix.flavor }})
    runs-on: macos-14
    needs: test
    strategy:
      matrix:
        flavor: [ dev, prod ]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > ios/Runner/GoogleService-Info.plist
      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: cd ios && pod install --repo-update
      - run: flutter build ios --flavor ${{ matrix.flavor }} --target lib/main.dart --release --no-codesign
      - uses: actions/upload-artifact@v3
        with:
          name: ios-${{ matrix.flavor }}
          path: build/ios/

  firebase-app-distribution:
    name: Deploy to Firebase App Distribution
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v3
        with:
          name: android-qa
          path: build/app/outputs/flutter-apk/
      - uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: qa-testers
          file: build/app/outputs/flutter-apk/app-qa-release.apk
          releaseNotes: "Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }}"
